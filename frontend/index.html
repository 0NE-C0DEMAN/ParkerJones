<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Foundry — PO Capture</title>
  <meta name="description" content="Drop PDF purchase orders, extract structured data with AI, and export a rolling Excel ledger." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- React + Babel + SheetJS + PDF.js (CDN) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root">
    <!-- Pre-hydration loading state -->
    <div style="height:100vh;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-family:Inter,system-ui;font-size:13px;">
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:14px;height:14px;border-radius:50%;border:2px solid #4f46e5;border-bottom-color:transparent;animation:spin 700ms linear infinite;"></div>
        Loading Foundry...
      </div>
    </div>
  </div>
  <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

  <!-- ===========================================================
       App scripts. Order matters — each file attaches to window.App.
       =========================================================== -->

  <!-- 1. Pure utilities (no React) -->
  <script src="src/lib/utils.js"></script>
  <script src="src/lib/config.js"></script>
  <script src="src/lib/api.js"></script>
  <script src="src/lib/pdfParser.js"></script>
  <script src="src/lib/openrouter.js"></script>
  <script src="src/lib/gemini.js"></script>
  <script src="src/lib/mockApi.js"></script>

  <!-- 2. React-using lib (hooks) + auth -->
  <script src="src/lib/auth.js"></script>
  <script type="text/babel" data-presets="env,react" src="src/lib/hooks.jsx"></script>

  <!-- 3. Components (atoms) -->
  <script type="text/babel" data-presets="env,react" src="src/components/Icon.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/components/Button.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/components/Badge.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/components/Card.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/components/Input.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/components/Toast.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/components/Confidence.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/components/Stat.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/components/EmptyState.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/components/Dropzone.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/components/Segmented.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/components/ErrorBoundary.jsx"></script>

  <!-- 4. Layout -->
  <script type="text/babel" data-presets="env,react" src="src/layout/Sidebar.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/layout/TopBar.jsx"></script>

  <!-- 5. Features — order matters: helpers/atoms first, then composites that use them -->
  <script type="text/babel" data-presets="env,react" src="src/features/StatusPill.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/features/Autocomplete.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/features/ActivityLog.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/features/Charts.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/features/UploadQueue.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/features/CommandPalette.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/features/POHeader.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/features/AddressBlock.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/features/LineItemsTable.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/features/ProcessingState.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/features/RecentUploadsList.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/features/RepositoryTable.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/features/PdfPreview.jsx"></script>

  <!-- 6. Views -->
  <script type="text/babel" data-presets="env,react" src="src/views/AuthView.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/views/UploadView.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/views/ReviewView.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/views/RepositoryView.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/views/SettingsView.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/views/ProfileView.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/views/TeamView.jsx"></script>

  <!-- 7. App + boot -->
  <script type="text/babel" data-presets="env,react" src="src/App.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/main.jsx"></script>
</body>
</html>
