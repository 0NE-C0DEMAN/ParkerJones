[theme]
base = "light"
primaryColor = "#4f46e5"
backgroundColor = "#f7f8fa"
secondaryBackgroundColor = "#ffffff"
textColor = "#0f172a"
font = "sans-serif"

[server]
headless = false
port = 8502
runOnSave = true
fileWatcherType = "auto"

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
showErrorDetails = true
